version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: insightville-backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightville-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
