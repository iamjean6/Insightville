version: '3.8'

# Local development compose file.
# In production (Railway), the root Dockerfile builds both frontend and backend
# into a single container managed by supervisord.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insightville
    ports:
      - "80:80"
    env_file:
      - ./Backend/.env
    restart: always
